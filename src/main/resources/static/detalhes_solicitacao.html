<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Central de Demandas Urbanas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="app">

    <!-- HEADER -->
    <header class="topbar">

        <div class="left-section">

            <button id="toggleSidebar" class="menu-btn">
                <i class="bi bi-list"></i>
            </button>

            <h4 class="system-title">
                Central de Demandas Urbanas
            </h4>

        </div>

        <div class="right-section">

            <button class="notification-btn">
                <i class="bi bi-bell"></i>
            </button>

            <div class="user-photo"></div>

            <span class="user-name">
                    Usuário
                </span>

        </div>

    </header>

    <!-- CONTEÚDO -->
    <div class="main-container">

        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar collapsed">

            <a href="index.html">
                <i class="bi bi-house"></i>
                <span>Home</span>
            </a>

            <a href="nova_solicitacao.html">
                <i class="bi bi-plus-circle"></i>
                <span>Nova Solicitação</span>
            </a>

            <a href="minhas_solicitacoes.html" class="active">
                <i class="bi bi-card-list"></i>
                <span>Minhas Solicitações</span>
            </a>

            <a href="atendimento.html">
                <i class="bi bi-clipboard-check"></i>
                <span>Atendimento</span>
            </a>

            <hr>

            <a href="#">
                <i class="bi bi-gear"></i>
                <span>Configurações</span>
            </a>

        </aside>

        <!-- CONTEUDO -->
        <main class="content">
            <div class="details-page">

                <section class="details-left">

                    <h2 id="detalheProtocolo">
                        Solicitação
                    </h2>

                    <div class="details-tags">
                        <span id="detalheStatus" class="detail-tag"></span>
                        <span id="detalhePrioridade" class="detail-tag"></span>
                        <span id="detalheData" class="detail-tag"></span>
                    </div>

                    <div class="info-card">

                        <h4>Informações</h4>

                        <div class="info-row">
                            <strong>Título:</strong>
                            <span id="detalheTitulo"></span>
                        </div>

                        <div class="info-row">
                            <strong>Localização:</strong>
                            <span id="detalheEndereco"></span>
                        </div>

                        <div class="info-row description-row">
                            <strong>Descrição:</strong>
                            <span id="detalheDescricao"></span>
                        </div>

                        <div class="attachments-fake">
                            <strong>Anexos:</strong>

                            <p class="sem-anexos">
                                Nenhum anexo enviado.
                            </p>
                        </div>

                    </div>

                </section>

                <section class="details-history">

                    <h3>Histórico</h3>

                    <div id="detalheHistorico" class="history-list">
                    </div>

                </section>

            </div>
        </main>

    </div>

</div>

<script src="js/sidebar.js"></script>
<script src="js/detalhes-solicitacao.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
