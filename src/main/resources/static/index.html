<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Central de Demandas Urbanas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app">

        <!-- HEADER -->
        <header class="topbar">

            <div class="left-section">

                <button id="toggleSidebar" class="menu-btn">
                    <i class="bi bi-list"></i>
                </button>

                <h4 class="system-title">
                    Central de Demandas Urbanas
                </h4>

            </div>

            <div class="right-section">

                <button class="notification-btn">
                    <i class="bi bi-bell"></i>
                </button>

                <div class="user-photo"></div>

                <span class="user-name">
                    Usuário
                </span>

            </div>

        </header>

        <!-- CONTEÚDO -->
        <div class="main-container">

            <!-- SIDEBAR -->
            <aside id="sidebar" class="sidebar collapsed">

                <a href="index.html" class="active">
                    <i class="bi bi-house"></i>
                    <span>Home</span>
                </a>

                <a href="nova_solicitacao.html">
                    <i class="bi bi-plus-circle"></i>
                    <span>Nova Solicitação</span>
                </a>

                <a href="minhas_solicitacoes.html">
                    <i class="bi bi-card-list"></i>
                    <span>Minhas Solicitações</span>
                </a>

                <hr>

                <a href="#">
                    <i class="bi bi-gear"></i>
                    <span>Configurações</span>
                </a>

            </aside>

            <!-- CONTEUDO -->
            <main class="content">

                <div class="home-grid">

                    <section class="panel">

                        <h3>
                            Últimas atualizações
                        </h3>

                        <div id="updatesList" class="updates-list">

                        </div>

                    </section>

                    <section class="panel">

                        <h3>
                            Solicitações
                        </h3>

                        <div class="solicitacoes-container">

                            <div class="metrics">

                                <div class="metric-card">
                                    <span>Total</span>
                                    <strong id="total">0</strong>
                                </div>

                                <div class="metric-card">
                                    <span>Em análise</span>
                                    <strong id="analise">0</strong>
                                </div>

                                <div class="metric-card">
                                    <span>Em andamento</span>
                                    <strong id="andamento">0</strong>
                                </div>

                                <div class="metric-card">
                                    <span>Concluídas</span>
                                    <strong id="concluidas">0</strong>
                                </div>

                            </div>

                            <div class="actions">

                                <a href="nova_solicitacao.html" class="action-btn home-action-link">
                                    Fazer nova solicitação
                                </a>

                                <a href="minhas_solicitacoes.html" class="action-btn secondary home-action-link">
                                    Conferir protocolo
                                </a>

                            </div>

                        </div>

                    </section>

                </div>
            </main>

        </div>

    </div>

    <script src="js/sidebar.js"></script>

    <script src="js/dashboard.js"></script>

    <script src="js/atualizacoes.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
